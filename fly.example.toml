# ✈️ Exemplo de configuração Fly.io
# Copie este arquivo como fly.toml e ajuste o nome do app
#
# app = 'sua-padaria'   → nome único no Fly.io
# primary_region = 'gru' → 'gru' (São Paulo) é o melhor para o Brasil
#
# Depois de configurar, rode:
#   fly launch --copy-config

app = 'sua-padaria'
primary_region = 'gru'

[build]

[env]
  PORT = '8080'

[[mounts]]
  source = 'padaria_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
